<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 El trovador !</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background-color: #0d0d0d; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
        }

        .audio-container {
            text-align: center;
            padding: 20px;
            max-width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .borne-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #f0c24d; 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .photo-container {
            position: relative;
            width: 100%;
            max-width: 500px; 
            max-height: 40vh; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            cursor: pointer;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        .photo-container:active .play-button {
            transform: translate(-50%, -50%) scale(0.92);
        }

        .play-button::before {
            content: '';
            border-style: solid;
            border-width: 18px 0 18px 28px;
            border-color: transparent transparent transparent #0d0d0d;
            margin-left: 6px;
        }

        .instruction-text {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .playing-text {
            font-size: 1rem;
            color: #888;
            margin-top: 10px;
            display: none;
        }

        audio {
            margin-top: 20px;
            display: none;
            width: 280px;
        }
    </style>
</head>
<body>

    <div class="audio-container">
        <div class="borne-title">7 Gastón Phébus, el trovador</div>
        
        <div id="statusText" class="instruction-text">
            Pulsa Reproducir<br>
            <span style="font-size: 0.85rem; font-weight: normal; color: #aaa;">Para que el sonido comience desde el principio.</span>
        </div>

        <div id="mediaBox" class="photo-container" onclick="playAudio()">
            <img src="https://filedn.eu/l6KtiAI390E7C3a3hKQgTcj/IMAGES%20CHATEAU%20PARCOURS/ARCHE%20CHATEAU.png" alt="Illustration Monument">
            <div id="playBtn" class="play-button"></div>
        </div>

        <div id="playingNotice" class="playing-text">🔊 Lecture de l'audio guide en cours...</div>

        <audio id="myAudio" controls preload="auto">
            <source src="https://filedn.eu/l6KtiAI390E7C3a3hKQgTcj/internet%20parcours%20chateau%20SP%201080%20P/7%20Gaston%20Phe%CC%81bus%2C%20le%20troubadour%20SP.mp3" type="audio/mpeg">
            Votre navigateur ne supporte pas l'écoute de ce fichier.
        </audio>
    </div>

    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            var playBtn = document.getElementById("playBtn");
            var statusText = document.getElementById("statusText");
            var playingNotice = document.getElementById("playingNotice");
            var mediaBox = document.getElementById("mediaBox");
            
            audio.play();
            audio.style.display = "inline-block";
            
            playBtn.style.display = "none";
            statusText.style.display = "none";
            playingNotice.style.display = "block";
            
            mediaBox.onclick = null;
            mediaBox.style.cursor = "default";
        }
    </script>

</body>
</html>
